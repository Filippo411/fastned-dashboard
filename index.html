<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fastned Italy — Station Deployment Planner</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'DM Sans', system-ui, sans-serif; background: #FAFAF8; }
    input[type="number"] { -moz-appearance: textfield; }
    input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    ::-webkit-scrollbar { height: 6px; width: 6px; }
    ::-webkit-scrollbar-track { background: #f0f0f0; border-radius: 3px; }
    ::-webkit-scrollbar-thumb { background: #ccc; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #aaa; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useCallback, useMemo } = React;

    const DEFAULT_ACTIVITIES = [
      { id: "feasibility", name: "Feasibility", lead: 4, buffer: 0, cost: 4000, dep: "Land contract signed", phase: "pre", seq: 0 },
      { id: "permitting", name: "Permitting", lead: 26, buffer: 4, cost: 8000, dep: "Feasibility completed", phase: "pre", seq: 1 },
      { id: "grid", name: "Grid Connection", lead: 52, buffer: 26, cost: 2000, dep: "Feasibility completed", phase: "pre", seq: 1 },
      { id: "cw", name: "Civil & Electrical Works", lead: 8, buffer: 5, cost: 100000, dep: "Permitting completed", phase: "con", seq: 2 },
      { id: "commissioning", name: "Commissioning", lead: 1, buffer: 0, cost: 1000, dep: "Grid + CW complete", phase: "con", seq: 4 },
    ];

    const DEFAULT_PROCUREMENT = [
      { id: "substation", name: "Substation/Transformer", origin: "Italy (local)", lead: 10, buffer: 1, cost: 150000, dep: "CW 20% done", trigger: 0.2, seq: 3.1 },
      { id: "chargers", name: "Chargers", origin: "NL / Italy", lead: 6, buffer: 1, cost: 240000, dep: "CW 20% done", trigger: 0.2, seq: 3.1 },
      { id: "electrical", name: "Electrical Items", origin: "Italy (local)", lead: 4, buffer: 1, cost: 50000, dep: "CW 20% done", trigger: 0.2, seq: 3.1 },
      { id: "canopy", name: "Canopy Material", origin: "NL (Fastned)", lead: 6, buffer: 1, cost: 150000, dep: "CW 30% done", trigger: 0.3, seq: 3.2 },
      { id: "signage", name: "Signage & Branding", origin: "NL (Fastned)", lead: 2, buffer: 0, cost: 10000, dep: "CW 50% done", trigger: 0.5, seq: 3.3 },
    ];

    function computeSchedule(activities, procurement) {
      const feas = activities.find(a => a.id === "feasibility");
      const perm = activities.find(a => a.id === "permitting");
      const grid = activities.find(a => a.id === "grid");
      const cw = activities.find(a => a.id === "cw");
      const comm = activities.find(a => a.id === "commissioning");
      const feasStart = 0;
      const feasEnd = feasStart + feas.lead + feas.buffer;
      const permStart = feasEnd;
      const permEnd = permStart + perm.lead + perm.buffer;
      const gridStart = feasEnd;
      const gridEnd = gridStart + grid.lead + grid.buffer;
      const cwStart = permEnd;
      const cwEnd = cwStart + cw.lead + cw.buffer;
      const commStart = Math.max(gridEnd, cwEnd);
      const commEnd = commStart + comm.lead + comm.buffer;
      const actSchedule = [
        { ...feas, start: feasStart, leadEnd: feasStart + feas.lead, end: feasEnd },
        { ...perm, start: permStart, leadEnd: permStart + perm.lead, end: permEnd },
        { ...grid, start: gridStart, leadEnd: gridStart + grid.lead, end: gridEnd },
        { ...cw, start: cwStart, leadEnd: cwStart + cw.lead, end: cwEnd },
        { ...comm, start: commStart, leadEnd: commStart + comm.lead, end: commEnd },
      ];
      const procSchedule = procurement.map(p => {
        const arrivalTarget = cwStart + Math.ceil(cw.lead * p.trigger);
        const orderStart = arrivalTarget - p.lead;
        const leadEnd = orderStart + p.lead;
        const end = leadEnd + p.buffer;
        return { ...p, start: orderStart, leadEnd, end, arrivalTarget };
      });
      const totalWeeks = commEnd;
      const totalCost = [...activities, ...procurement].reduce((s, a) => s + a.cost, 0);
      return { actSchedule, procSchedule, totalWeeks, totalCost, cwStart, cwEnd: cwStart + cw.lead, cwBufferedEnd: cwEnd, commEnd };
    }

    const ACT_COLORS = {
      feasibility: { main: "#2980B9", light: "#AED6F1" },
      permitting: { main: "#8E44AD", light: "#D2B4DE" },
      grid: { main: "#D35400", light: "#F0B27A" },
      cw: { main: "#27AE60", light: "#A9DFBF" },
      commissioning: { main: "#C0392B", light: "#F1948A" },
    };
    const PROC_COLORS = {
      substation: { main: "#16A085", light: "#A3E4D7" },
      chargers: { main: "#E74C3C", light: "#F5B7B1" },
      electrical: { main: "#F39C12", light: "#FAD7A0" },
      canopy: { main: "#7D3C98", light: "#D2B4DE" },
      signage: { main: "#2C3E50", light: "#AEB6BF" },
    };

    function GanttBar({ start, leadEnd, end, totalWeeks, mainColor, lightColor, label }) {
      const s = (start / totalWeeks) * 100;
      const lw = ((leadEnd - start) / totalWeeks) * 100;
      const bw = ((end - leadEnd) / totalWeeks) * 100;
      return (
        <div style={{ position: "relative", height: 26, width: "100%" }}>
          <div style={{
            position: "absolute", left: `${s}%`, width: `${lw}%`, height: "100%",
            background: mainColor, borderRadius: bw > 0 ? "4px 0 0 4px" : "4px",
            display: "flex", alignItems: "center", justifyContent: "center",
            fontSize: 10, color: "#fff", fontWeight: 600, boxShadow: "0 1px 3px rgba(0,0,0,0.15)",
            overflow: "hidden",
          }}>
            {lw > 4 && <span style={{ whiteSpace: "nowrap", padding: "0 3px" }}>{label}</span>}
          </div>
          {bw > 0.1 && (
            <div style={{
              position: "absolute", left: `${s + lw}%`, width: `${bw}%`, height: "100%",
              background: `repeating-linear-gradient(45deg, ${lightColor}, ${lightColor} 3px, ${mainColor}33 3px, ${mainColor}33 6px)`,
              borderRadius: "0 4px 4px 0", border: `1px solid ${mainColor}44`,
            }} />
          )}
        </div>
      );
    }

    function WeekScale({ totalWeeks, cwStart, cwEnd }) {
      const step = totalWeeks > 60 ? 10 : totalWeeks > 30 ? 5 : 2;
      const ticks = [];
      for (let w = 0; w <= totalWeeks; w += step) ticks.push(w);
      return (
        <div style={{ position: "relative", height: 20, width: "100%", borderBottom: "1px solid #ddd", marginBottom: 2 }}>
          {cwStart != null && <div style={{
            position: "absolute", left: `${(cwStart / totalWeeks) * 100}%`,
            width: `${((cwEnd - cwStart) / totalWeeks) * 100}%`,
            height: "100%", background: "#27AE6012", borderLeft: "1px dashed #27AE60", borderRight: "1px dashed #27AE60",
          }} />}
          {ticks.map(w => (
            <div key={w} style={{
              position: "absolute", left: `${(w / totalWeeks) * 100}%`, top: 0, height: "100%",
              borderLeft: "1px solid #e8e8e8", display: "flex", alignItems: "flex-end", paddingLeft: 2,
            }}>
              <span style={{ fontSize: 8, color: "#aaa", fontFamily: "'JetBrains Mono', monospace" }}>W{w}</span>
            </div>
          ))}
        </div>
      );
    }

    function InputField({ value, onChange, unit, small }) {
      return (
        <div style={{ display: "flex", alignItems: "center", gap: 4 }}>
          <input type="number" min={0} value={value}
            onChange={e => onChange(Number(e.target.value))}
            style={{
              width: small ? 52 : 72, padding: "4px 6px", border: "1.5px solid #ddd", borderRadius: 5,
              fontSize: 12, fontFamily: "'JetBrains Mono', monospace", color: "#2563EB",
              fontWeight: 600, background: "#FAFAFA", outline: "none",
            }}
            onFocus={e => e.target.style.borderColor = "#FFC800"}
            onBlur={e => e.target.style.borderColor = "#ddd"}
          />
          {unit && <span style={{ fontSize: 10, color: "#999" }}>{unit}</span>}
        </div>
      );
    }

    function downloadCSV(data, filename) {
      const headers = Object.keys(data[0]);
      const csv = [headers.join(","), ...data.map(row => headers.map(h => {
        const v = row[h]; return typeof v === "string" && v.includes(",") ? `"${v}"` : v;
      }).join(","))].join("\n");
      const blob = new Blob([csv], { type: "text/csv" });
      const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = filename; a.click();
    }

    const fmt = n => n.toLocaleString("de-DE");

    function App() {
      const [activities, setActivities] = useState(DEFAULT_ACTIVITIES);
      const [procurement, setProcurement] = useState(DEFAULT_PROCUREMENT);
      const [snapshots, setSnapshots] = useState([]);
      const [tab, setTab] = useState("gantt");

      const upAct = useCallback((id, f, v) => setActivities(p => p.map(a => a.id === id ? { ...a, [f]: v } : a)), []);
      const upProc = useCallback((id, f, v) => setProcurement(p => p.map(a => a.id === id ? { ...a, [f]: v } : a)), []);

      const sched = useMemo(() => computeSchedule(activities, procurement), [activities, procurement]);
      const { actSchedule, procSchedule, totalCost, cwStart, cwEnd, cwBufferedEnd, commEnd } = sched;
      const cwLead = activities.find(a => a.id === "cw").lead;

      const saveSnap = () => {
        const ts = new Date().toLocaleTimeString();
        setSnapshots(p => [...p, {
          id: Date.now(), label: `Scenario ${p.length + 1} (${ts})`,
          totalWeeks: commEnd, totalCost,
          acts: actSchedule.map(a => ({ n: a.name, l: a.lead, b: a.buffer })),
          procs: procSchedule.map(p => ({ n: p.name, l: p.lead, b: p.buffer })),
        }]);
      };

      const exportAct = () => downloadCSV(actSchedule.map(a => ({
        Activity: a.name, "Lead(wks)": a.lead, "Buffer(wks)": a.buffer, "Start(wk)": a.start, "LeadEnd(wk)": a.leadEnd, "End(wk)": a.end, "Cost(EUR)": a.cost
      })), "fastned_activities.csv");

      const exportProc = () => downloadCSV(procSchedule.map(p => ({
        Material: p.name, "Lead(wks)": p.lead, "Buffer(wks)": p.buffer, "Order(wk)": p.start, "Delivery(wk)": p.leadEnd, "BufferEnd(wk)": p.end, "ArrivalTarget(wk)": p.arrivalTarget, "Cost(EUR)": p.cost
      })), "fastned_procurement.csv");

      const btnStyle = (active) => ({
        padding: "12px 18px", border: "none", background: "none", cursor: "pointer",
        fontSize: 13, fontWeight: active ? 700 : 500, color: active ? "#2D2D2D" : "#999",
        borderBottom: active ? "3px solid #FFC800" : "3px solid transparent",
      });

      const cardStyle = (bg = "#fff") => ({
        background: bg, borderRadius: 12, padding: 22, boxShadow: "0 1px 8px rgba(0,0,0,0.05)", border: "1px solid #eee",
      });

      const exportBtn = (onClick) => (
        <button onClick={onClick} style={{
          padding: "7px 14px", background: "#2D2D2D", color: "#FFC800", border: "none",
          borderRadius: 6, fontSize: 11, fontWeight: 600, cursor: "pointer",
        }}>↓ CSV</button>
      );

      return (
        <div style={{ minHeight: "100vh", background: "#FAFAF8", color: "#1a1a1a" }}>
          {/* HEADER */}
          <div style={{
            background: "linear-gradient(135deg, #2D2D2D, #1a1a1a)", padding: "20px 28px",
            display: "flex", alignItems: "center", justifyContent: "space-between", flexWrap: "wrap", gap: 12,
          }}>
            <div style={{ display: "flex", alignItems: "center", gap: 14 }}>
              <div style={{ width: 34, height: 34, background: "#FFC800", borderRadius: 6, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 18 }}>⚡</div>
              <div>
                <h1 style={{ margin: 0, fontSize: 18, fontWeight: 700, color: "#FFC800" }}>Fastned Italy</h1>
                <p style={{ margin: 0, fontSize: 11, color: "#888", letterSpacing: "0.06em", textTransform: "uppercase" }}>Station Deployment Planner</p>
              </div>
            </div>
            <div style={{ display: "flex", gap: 20, alignItems: "center" }}>
              <div style={{ textAlign: "right" }}>
                <div style={{ fontSize: 10, color: "#777", textTransform: "uppercase" }}>Duration</div>
                <div style={{ fontSize: 20, fontWeight: 700, color: "#FFC800", fontFamily: "'JetBrains Mono'" }}>{commEnd} wks</div>
              </div>
              <div style={{ width: 1, height: 32, background: "#444" }} />
              <div style={{ textAlign: "right" }}>
                <div style={{ fontSize: 10, color: "#777", textTransform: "uppercase" }}>Cost/Station</div>
                <div style={{ fontSize: 20, fontWeight: 700, color: "#fff", fontFamily: "'JetBrains Mono'" }}>{fmt(totalCost)} €</div>
              </div>
            </div>
          </div>

          {/* TABS */}
          <div style={{ display: "flex", gap: 0, padding: "0 28px", background: "#fff", borderBottom: "1px solid #e5e5e5", overflowX: "auto" }}>
            {[["gantt","📊 Gantt"],["inputs","⚙️ Parameters"],["costs","💰 Costs"],["compare","🔄 Compare"]].map(([k,l]) => (
              <button key={k} onClick={() => setTab(k)} style={btnStyle(tab === k)}>{l}</button>
            ))}
          </div>

          <div style={{ padding: "20px 28px", maxWidth: 1400, margin: "0 auto" }}>

            {/* ====== GANTT TAB ====== */}
            {tab === "gantt" && <div style={{ display: "flex", flexDirection: "column", gap: 24 }}>
              {/* Activities Gantt */}
              <div style={cardStyle()}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>
                  <div>
                    <h2 style={{ margin: 0, fontSize: 15, fontWeight: 700 }}>Project Activities Timeline</h2>
                    <p style={{ margin: "3px 0 0", fontSize: 11, color: "#999" }}>Solid = lead time · Hatched = buffer</p>
                  </div>
                  {exportBtn(exportAct)}
                </div>
                <WeekScale totalWeeks={commEnd + 2} cwStart={cwStart} cwEnd={cwEnd} />
                <div style={{ display: "flex", flexDirection: "column", gap: 5 }}>
                  {actSchedule.map(a => (
                    <div key={a.id} style={{ display: "flex", alignItems: "center", gap: 10 }}>
                      <div style={{ width: 170, fontSize: 11, fontWeight: 600, color: "#333", flexShrink: 0, textAlign: "right", paddingRight: 6 }}>
                        {a.name}
                        <span style={{ display: "block", fontSize: 9, color: "#aaa", fontWeight: 400 }}>W{a.start}–W{a.end} ({a.lead}+{a.buffer}w)</span>
                      </div>
                      <div style={{ flex: 1 }}>
                        <GanttBar start={a.start} leadEnd={a.leadEnd} end={a.end} totalWeeks={commEnd + 2}
                          mainColor={ACT_COLORS[a.id]?.main} lightColor={ACT_COLORS[a.id]?.light} label={`${a.lead}w`} />
                      </div>
                    </div>
                  ))}
                </div>
                <div style={{ display: "flex", gap: 14, marginTop: 14, flexWrap: "wrap" }}>
                  {[
                    { l: "Feasibility Done", w: actSchedule[0].end },
                    { l: "Permit Granted", w: actSchedule[1].end },
                    { l: "CW Start", w: cwStart },
                    { l: "Grid Done", w: actSchedule[2].leadEnd },
                    { l: "GO-LIVE", w: commEnd },
                  ].map(m => (
                    <span key={m.l} style={{ fontSize: 10, color: "#666", display: "flex", alignItems: "center", gap: 3 }}>
                      <span style={{ display: "inline-block", width: 7, height: 7, background: "#C0392B", transform: "rotate(45deg)" }} />
                      <b>W{m.w}</b> {m.l}
                    </span>
                  ))}
                </div>
              </div>

              {/* Procurement Gantt */}
              <div style={cardStyle("#F8F8F6")}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>
                  <div>
                    <h2 style={{ margin: 0, fontSize: 15, fontWeight: 700 }}>Procurement Timeline</h2>
                    <p style={{ margin: "3px 0 0", fontSize: 11, color: "#999" }}>Backward-scheduled from CW milestones · <span style={{ color: "#27AE60", fontWeight: 600 }}>Green zone</span> = CW period</p>
                  </div>
                  {exportBtn(exportProc)}
                </div>
                {(() => {
                  const minW = Math.max(0, Math.min(...procSchedule.map(p => p.start)) - 2);
                  const maxW = Math.max(cwBufferedEnd, ...procSchedule.map(p => p.end)) + 2;
                  const rng = maxW - minW;
                  return <>
                    <WeekScale totalWeeks={rng} cwStart={cwStart - minW} cwEnd={cwStart + cwLead - minW} />
                    {/* CW ref bar */}
                    <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 3 }}>
                      <div style={{ width: 170, fontSize: 11, fontWeight: 700, color: "#27AE60", flexShrink: 0, textAlign: "right", paddingRight: 6 }}>
                        Civil & Elec. Works
                        <span style={{ display: "block", fontSize: 9, color: "#aaa", fontWeight: 400 }}>W{cwStart}–W{cwBufferedEnd} (ref)</span>
                      </div>
                      <div style={{ flex: 1, position: "relative" }}>
                        <GanttBar start={cwStart - minW} leadEnd={cwEnd - minW} end={cwBufferedEnd - minW}
                          totalWeeks={rng} mainColor="#27AE60" lightColor="#A9DFBF" label="CW" />
                        {[0.2, 0.3, 0.5].map(pct => {
                          const wk = cwStart + Math.ceil(cwLead * pct);
                          return <div key={pct} style={{ position: "absolute", left: `${((wk - minW) / rng) * 100}%`, top: -12, fontSize: 8, color: "#27AE60", fontWeight: 700, transform: "translateX(-50%)" }}>{Math.round(pct * 100)}%</div>;
                        })}
                      </div>
                    </div>
                    <div style={{ height: 1, background: "#ddd", margin: "6px 0" }} />
                    <div style={{ display: "flex", flexDirection: "column", gap: 5 }}>
                      {procSchedule.map(p => (
                        <div key={p.id} style={{ display: "flex", alignItems: "center", gap: 10 }}>
                          <div style={{ width: 170, fontSize: 11, fontWeight: 600, color: "#333", flexShrink: 0, textAlign: "right", paddingRight: 6 }}>
                            {p.name}
                            <span style={{ display: "block", fontSize: 9, color: "#aaa", fontWeight: 400 }}>
                              Order W{p.start} → Del W{p.leadEnd} {p.buffer > 0 ? `(+${p.buffer}w)` : ""}
                            </span>
                          </div>
                          <div style={{ flex: 1, position: "relative" }}>
                            <GanttBar start={p.start - minW} leadEnd={p.leadEnd - minW} end={p.end - minW}
                              totalWeeks={rng} mainColor={PROC_COLORS[p.id]?.main} lightColor={PROC_COLORS[p.id]?.light} label={`${p.lead}w`} />
                            <div style={{ position: "absolute", left: `${((p.arrivalTarget - minW) / rng) * 100}%`, top: 0, height: "100%", borderLeft: "2px dashed #C0392B", zIndex: 5 }} />
                          </div>
                        </div>
                      ))}
                    </div>
                    <div style={{ display: "flex", gap: 14, marginTop: 12 }}>
                      <span style={{ fontSize: 10, color: "#666", display: "flex", alignItems: "center", gap: 4 }}>
                        <span style={{ width: 16, height: 2, background: "#C0392B", borderTop: "1px dashed #C0392B", display: "inline-block" }} />
                        Arrival target
                      </span>
                      <span style={{ fontSize: 10, color: "#666", display: "flex", alignItems: "center", gap: 4 }}>
                        <span style={{ width: 16, height: 10, background: "repeating-linear-gradient(45deg,#aaa,#aaa 2px,#fff 2px,#fff 4px)", borderRadius: 2, display: "inline-block" }} />
                        Buffer
                      </span>
                    </div>
                  </>;
                })()}
              </div>
            </div>}

            {/* ====== INPUTS TAB ====== */}
            {tab === "inputs" && <div style={{ display: "flex", flexDirection: "column", gap: 20 }}>
              <div style={cardStyle()}>
                <h2 style={{ margin: "0 0 14px", fontSize: 15, fontWeight: 700 }}>Project Activities</h2>
                <div style={{ overflowX: "auto" }}>
                  <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 12 }}>
                    <thead>
                      <tr style={{ borderBottom: "2px solid #eee" }}>
                        {["Activity","Lead Time","Buffer","Cost (€)","Dependency"].map(h => (
                          <th key={h} style={{ textAlign: "left", padding: "8px 10px", fontSize: 10, color: "#888", textTransform: "uppercase", fontWeight: 600 }}>{h}</th>
                        ))}
                      </tr>
                    </thead>
                    <tbody>
                      {activities.map(a => (
                        <tr key={a.id} style={{ borderBottom: "1px solid #f0f0f0" }}>
                          <td style={{ padding: "8px 10px", fontWeight: 600, display: "flex", alignItems: "center", gap: 6 }}>
                            <span style={{ width: 8, height: 8, borderRadius: 2, background: ACT_COLORS[a.id]?.main, display: "inline-block" }} />{a.name}
                          </td>
                          <td style={{ padding: "8px 10px" }}><InputField value={a.lead} onChange={v => upAct(a.id, "lead", v)} unit="wks" small /></td>
                          <td style={{ padding: "8px 10px" }}><InputField value={a.buffer} onChange={v => upAct(a.id, "buffer", v)} unit="wks" small /></td>
                          <td style={{ padding: "8px 10px" }}><InputField value={a.cost} onChange={v => upAct(a.id, "cost", v)} unit="€" /></td>
                          <td style={{ padding: "8px 10px", color: "#888", fontSize: 11 }}>{a.dep}</td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </div>
              <div style={cardStyle("#F8F8F6")}>
                <h2 style={{ margin: "0 0 14px", fontSize: 15, fontWeight: 700 }}>Procurement Activities</h2>
                <div style={{ overflowX: "auto" }}>
                  <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 12 }}>
                    <thead>
                      <tr style={{ borderBottom: "2px solid #e5e5e0" }}>
                        {["Material","Lead Time","Buffer","Cost (€)","CW Trigger","Origin"].map(h => (
                          <th key={h} style={{ textAlign: "left", padding: "8px 10px", fontSize: 10, color: "#888", textTransform: "uppercase", fontWeight: 600 }}>{h}</th>
                        ))}
                      </tr>
                    </thead>
                    <tbody>
                      {procurement.map(p => (
                        <tr key={p.id} style={{ borderBottom: "1px solid #eee" }}>
                          <td style={{ padding: "8px 10px", fontWeight: 600, display: "flex", alignItems: "center", gap: 6 }}>
                            <span style={{ width: 8, height: 8, borderRadius: 2, background: PROC_COLORS[p.id]?.main, display: "inline-block" }} />{p.name}
                          </td>
                          <td style={{ padding: "8px 10px" }}><InputField value={p.lead} onChange={v => upProc(p.id, "lead", v)} unit="wks" small /></td>
                          <td style={{ padding: "8px 10px" }}><InputField value={p.buffer} onChange={v => upProc(p.id, "buffer", v)} unit="wks" small /></td>
                          <td style={{ padding: "8px 10px" }}><InputField value={p.cost} onChange={v => upProc(p.id, "cost", v)} unit="€" /></td>
                          <td style={{ padding: "8px 10px" }}><InputField value={Math.round(p.trigger * 100)} onChange={v => upProc(p.id, "trigger", v / 100)} unit="%" small /></td>
                          <td style={{ padding: "8px 10px", color: "#888", fontSize: 11 }}>{p.origin}</td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </div>
            </div>}

            {/* ====== COSTS TAB ====== */}
            {tab === "costs" && <div style={{ display: "flex", gap: 20, flexWrap: "wrap" }}>
              <div style={{ ...cardStyle(), flex: "1 1 420px" }}>
                <h2 style={{ margin: "0 0 14px", fontSize: 15, fontWeight: 700 }}>Cost Breakdown per Station</h2>
                {[...actSchedule, ...procSchedule].sort((a, b) => b.cost - a.cost).map(item => {
                  const pct = (item.cost / totalCost) * 100;
                  const c = ({ ...ACT_COLORS, ...PROC_COLORS })[item.id]?.main || "#666";
                  return (
                    <div key={item.id} style={{ marginBottom: 10 }}>
                      <div style={{ display: "flex", justifyContent: "space-between", fontSize: 11, marginBottom: 2 }}>
                        <span style={{ fontWeight: 600 }}>{item.name}</span>
                        <span style={{ fontFamily: "'JetBrains Mono'", fontWeight: 600 }}>{fmt(item.cost)} € <span style={{ color: "#aaa", fontWeight: 400 }}>({pct.toFixed(1)}%)</span></span>
                      </div>
                      <div style={{ height: 16, background: "#f0f0f0", borderRadius: 3 }}>
                        <div style={{ width: `${pct}%`, height: "100%", background: c, borderRadius: 3, transition: "width 0.3s" }} />
                      </div>
                    </div>
                  );
                })}
                <div style={{ borderTop: "2px solid #2D2D2D", paddingTop: 8, marginTop: 10, display: "flex", justifyContent: "space-between" }}>
                  <span style={{ fontSize: 13, fontWeight: 700 }}>TOTAL</span>
                  <span style={{ fontSize: 13, fontWeight: 700, fontFamily: "'JetBrains Mono'" }}>{fmt(totalCost)} €</span>
                </div>
              </div>
              <div style={{ flex: "1 1 280px", display: "flex", flexDirection: "column", gap: 14 }}>
                {[{ l: "Project Activities", items: actSchedule, bg: "#fff" }, { l: "Procurement", items: procSchedule, bg: "#F8F8F6" }].map(cat => {
                  const ct = cat.items.reduce((s, i) => s + i.cost, 0);
                  return (
                    <div key={cat.l} style={cardStyle(cat.bg)}>
                      <div style={{ display: "flex", justifyContent: "space-between" }}>
                        <h3 style={{ margin: 0, fontSize: 13, fontWeight: 700 }}>{cat.l}</h3>
                        <span style={{ fontSize: 15, fontWeight: 700, fontFamily: "'JetBrains Mono'", color: "#FFC800" }}>{fmt(ct)} €</span>
                      </div>
                      <div style={{ fontSize: 11, color: "#888", marginTop: 2 }}>{((ct / totalCost) * 100).toFixed(1)}% of total</div>
                      <div style={{ height: 5, background: "#e0e0e0", borderRadius: 3, marginTop: 6 }}>
                        <div style={{ width: `${(ct / totalCost) * 100}%`, height: "100%", background: "#FFC800", borderRadius: 3 }} />
                      </div>
                    </div>
                  );
                })}
                <div style={{ background: "#2D2D2D", borderRadius: 12, padding: 18, color: "#fff" }}>
                  <h3 style={{ margin: "0 0 10px", fontSize: 13, fontWeight: 700, color: "#FFC800" }}>Key Metrics</h3>
                  {[
                    { l: "Cost/kW (4×400kW)", v: `${fmt(Math.round(totalCost / 1600))} €/kW` },
                    { l: "Procurement share", v: `${((procSchedule.reduce((s, p) => s + p.cost, 0) / totalCost) * 100).toFixed(1)}%` },
                    { l: "Critical path", v: `${commEnd} weeks` },
                    { l: "Binding constraint", v: sched.commEnd > cwBufferedEnd ? "Grid Connection" : "Civil Works" },
                    { l: "15 stations total", v: `${fmt(totalCost * 15)} €` },
                  ].map(m => (
                    <div key={m.l} style={{ display: "flex", justifyContent: "space-between", padding: "5px 0", borderBottom: "1px solid #444", fontSize: 11 }}>
                      <span style={{ color: "#aaa" }}>{m.l}</span>
                      <span style={{ fontWeight: 600, fontFamily: "'JetBrains Mono'" }}>{m.v}</span>
                    </div>
                  ))}
                </div>
              </div>
            </div>}

            {/* ====== COMPARE TAB ====== */}
            {tab === "compare" && <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 10 }}>
                <div>
                  <h2 style={{ margin: 0, fontSize: 15, fontWeight: 700 }}>Scenario Comparison</h2>
                  <p style={{ margin: "3px 0 0", fontSize: 11, color: "#999" }}>Save snapshots, modify parameters, compare</p>
                </div>
                <div style={{ display: "flex", gap: 8 }}>
                  <button onClick={saveSnap} style={{
                    padding: "9px 18px", background: "#FFC800", color: "#2D2D2D", border: "none",
                    borderRadius: 7, fontSize: 12, fontWeight: 700, cursor: "pointer",
                  }}>📸 Save Snapshot</button>
                  <button onClick={() => downloadCSV([
                    { Scenario: "Current", Weeks: commEnd, "Cost(EUR)": totalCost },
                    ...snapshots.map(s => ({ Scenario: s.label, Weeks: s.totalWeeks, "Cost(EUR)": s.totalCost }))
                  ], "scenarios.csv")} style={{
                    padding: "9px 18px", background: "#2D2D2D", color: "#FFC800", border: "none",
                    borderRadius: 7, fontSize: 12, fontWeight: 600, cursor: "pointer",
                  }}>↓ Export</button>
                </div>
              </div>
              <div style={{ ...cardStyle(), border: "2px solid #FFC800", background: "#FFC80008" }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                  <div><h3 style={{ margin: 0, fontSize: 13, fontWeight: 700 }}>📍 Current</h3></div>
                  <div style={{ display: "flex", gap: 20 }}>
                    <div style={{ textAlign: "center" }}>
                      <div style={{ fontSize: 20, fontWeight: 700, fontFamily: "'JetBrains Mono'", color: "#FFC800" }}>{commEnd}</div>
                      <div style={{ fontSize: 9, color: "#888", textTransform: "uppercase" }}>weeks</div>
                    </div>
                    <div style={{ textAlign: "center" }}>
                      <div style={{ fontSize: 20, fontWeight: 700, fontFamily: "'JetBrains Mono'" }}>{fmt(totalCost)} €</div>
                      <div style={{ fontSize: 9, color: "#888", textTransform: "uppercase" }}>per station</div>
                    </div>
                  </div>
                </div>
              </div>
              {snapshots.length === 0 ?
                <div style={{ textAlign: "center", padding: 40, color: "#ccc" }}>No snapshots yet</div>
              : snapshots.map(s => {
                const wd = s.totalWeeks - commEnd; const cd = s.totalCost - totalCost;
                return (
                  <div key={s.id} style={{ ...cardStyle(), display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                    <div>
                      <h4 style={{ margin: 0, fontSize: 12, fontWeight: 700 }}>{s.label}</h4>
                      <div style={{ fontSize: 10, color: "#888", marginTop: 3 }}>{s.acts.map(a => `${a.n}(${a.l}+${a.b}w)`).join(" · ")}</div>
                    </div>
                    <div style={{ display: "flex", gap: 20, alignItems: "center" }}>
                      <div style={{ textAlign: "center" }}>
                        <div style={{ fontSize: 16, fontWeight: 700, fontFamily: "'JetBrains Mono'" }}>{s.totalWeeks}w</div>
                        <div style={{ fontSize: 10, color: wd > 0 ? "#E74C3C" : wd < 0 ? "#27AE60" : "#888", fontWeight: 600 }}>{wd > 0 ? `+${wd}` : wd < 0 ? wd : "="}</div>
                      </div>
                      <div style={{ textAlign: "center" }}>
                        <div style={{ fontSize: 16, fontWeight: 700, fontFamily: "'JetBrains Mono'" }}>{fmt(s.totalCost)}€</div>
                        <div style={{ fontSize: 10, color: cd > 0 ? "#E74C3C" : cd < 0 ? "#27AE60" : "#888", fontWeight: 600 }}>{cd > 0 ? `+${fmt(cd)}` : cd < 0 ? `-${fmt(Math.abs(cd))}` : "="}€</div>
                      </div>
                      <button onClick={() => setSnapshots(p => p.filter(x => x.id !== s.id))} style={{
                        padding: "3px 7px", background: "none", border: "1px solid #ddd", borderRadius: 3, cursor: "pointer", fontSize: 11, color: "#999"
                      }}>✕</button>
                    </div>
                  </div>
                );
              })}
            </div>}

          </div>

          {/* FOOTER */}
          <div style={{ textAlign: "center", padding: "20px", fontSize: 11, color: "#bbb", borderTop: "1px solid #eee", marginTop: 20 }}>
            Fastned Italy — Station Deployment Planner · Built for the PM Italy Case Assignment
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
